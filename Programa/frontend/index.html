<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Colonias Galácticas - Cliente</title>
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <header>
        <h1>Colonias Galácticas </h1>
    </header>

    <main>
        <section class="panel">
            <h2>Crear partida</h2>
            <label>Nombre de la partida<br /><input id="crear-nombre" placeholder="Mi partida" /></label>
            <label>Tu nombre<br /><input id="crear-jugador" placeholder="Jugador1" /></label>
            <button id="btn-crear">Crear</button>
            <div id="crear-respuesta" class="respuesta"></div>
        </section>

        <section class="panel">
            <h2>Unirse a partida</h2>
            <label>ID de partida<br /><input id="unirse-id" placeholder="PXXXX" /></label>
            <label>Tu nombre<br /><input id="unirse-jugador" placeholder="Jugador2" /></label>
            <button id="btn-unirse">Unirse</button>
            <div id="unirse-respuesta" class="respuesta"></div>
        </section>

        <section class="panel">
            <h2>Ranking</h2>
            <button id="btn-ranking">Ver ranking</button>
            <ul id="ranking-list"></ul>
        </section>

        <section class="panel">
            <h2>Universo</h2>
            <button id="btn-universo">Cargar universo</button>
            <div id="universo"></div>
        </section>

        <section class="panel">
            <h2>Eventos</h2>
            <div id="log"></div>
        </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
</body>

</html>
